# Set new mod key
set-option -g prefix M-a
unbind C-b

# Unbind Left and Right arrow keys
# unbind -n Left
# unbind -n Right

# Bind M-Right and M-Left to navigate windows
# bind -n M-l next-window
# bind -n M-h previous-window

bind-key -n F1 select-window -t 0
bind-key -n F2 select-window -t 1
bind-key -n F3 select-window -t 2
bind-key -n F4 select-window -t 3
bind-key -n F5 select-window -t 4
bind-key -n F6 select-window -t 5
bind-key -n F7 select-window -t 6
bind-key -n F8 select-window -t 7
bind-key -n F9 select-window -t 8
bind-key -n F10 select-window -t 9

# Set the status line appearance
set-option -g status-style "bg=default,fg=colour208"

# set-option -g status-position top
# set -g window-status-current-format '[#I:#W]'
set -g window-status-current-format "#[fg=green][#I:#W]#[fg=default]"
set -g status-right ''

# Use vi keys in copy mode
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind | split-window -h
bind - split-window -v
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

set -g mouse on

unbind r
bind r source-file ~/.tmux.conf \;

unbind x
bind x kill-server

# bind-key -v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind v copy-mode \; send -X begin-selection
